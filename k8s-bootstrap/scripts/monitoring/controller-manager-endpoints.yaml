apiVersion: v1
kind: Endpoints
metadata:
  name: prom-kube-controller-manager
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-controller-manager
    jobLabel: kube-controller-manager
    release: prometheus-stack
subsets:
  - addresses:
      - ip: 10.0.0.10
    ports:
      - name: http-metrics
        port: 10257
        protocol: TCP
