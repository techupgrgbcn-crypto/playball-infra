apiVersion: v1
kind: Endpoints
metadata:
  name: prom-kube-etcd
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-etcd
    jobLabel: kube-etcd
    release: prometheus-stack
subsets:
  - addresses:
      - ip: 10.0.0.10
    ports:
      - name: http-metrics
        port: 2381
        protocol: TCP
