# Istiod - Istio Control Plane
# Requires istio-base to be installed first

istiod:
  global:
    istioNamespace: istio-system

    # Tempo 연동 (Zipkin 호환 endpoint)
    tracer:
      zipkin:
        address: "tempo.monitoring.svc.cluster.local:9411"

    # Prometheus 연동
    meshConfig:
      enableTracing: true
      defaultConfig:
        tracing:
          sampling: 100  # 100% 샘플링 (dev/staging)

  pilot:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    autoscaleEnabled: false
    replicaCount: 1

# Node placement
nodeSelector: {}
tolerations: []
