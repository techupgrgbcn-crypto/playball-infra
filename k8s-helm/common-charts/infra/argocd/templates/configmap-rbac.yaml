{{- if and .Values.rbac.policy (not .Values.rbac.eso.enabled) }}
# ESO 사용 시 이 ConfigMap은 생성하지 않음 (install.sh에서 관리)
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: {{ .Values.rbac.defaultPolicy | default "role:none" | quote }}
  policy.csv: |
{{ .Values.rbac.policy | indent 4 }}
  scopes: '[email]'
{{- end }}
