{{- if and .Values.enabled .Values.rateLimiting.global.enabled }}
# ============================================================
# Rate Limit Service + Redis
# Global Rate Limiting을 위한 인프라
# ============================================================

{{- if .Values.rateLimiting.global.redis.internal }}
---
# ===========================================
# Redis for Rate Limiting (Internal)
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratelimit-redis
  namespace: istio-system
  labels:
    app: ratelimit-redis
    component: ratelimit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratelimit-redis
  template:
    metadata:
      labels:
        app: ratelimit-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit-redis
  namespace: istio-system
  labels:
    app: ratelimit-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: ratelimit-redis
{{- end }}

---
# ===========================================
# Rate Limit Service ConfigMap
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config
  namespace: istio-system
  labels:
    app: ratelimit
data:
  config.yaml: |
    domain: {{ .Values.rateLimiting.global.domain }}
    descriptors:
      {{- range .Values.rateLimiting.global.descriptors }}
      - key: {{ .key }}
        {{- if .value }}
        value: "{{ .value }}"
        {{- end }}
        {{- if .rateLimit }}
        rate_limit:
          {{- if .rateLimit.unlimited }}
          unlimited: true
          {{- else }}
          requests_per_unit: {{ .rateLimit.requestsPerUnit }}
          unit: {{ .rateLimit.unit }}
          {{- end }}
        {{- end }}
        {{- if .descriptors }}
        descriptors:
          {{- range .descriptors }}
          - key: {{ .key }}
            {{- if .value }}
            value: "{{ .value }}"
            {{- end }}
            rate_limit:
              {{- if .rateLimit.unlimited }}
              unlimited: true
              {{- else }}
              requests_per_unit: {{ .rateLimit.requestsPerUnit }}
              unit: {{ .rateLimit.unit }}
              {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

---
# ===========================================
# Rate Limit Service
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratelimit
  namespace: istio-system
  labels:
    app: ratelimit
    component: ratelimit
spec:
  replicas: {{ .Values.rateLimiting.global.service.replicas }}
  selector:
    matchLabels:
      app: ratelimit
  template:
    metadata:
      labels:
        app: ratelimit
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ratelimit-service.yaml") . | sha256sum | trunc 8 }}
    spec:
      containers:
        - name: ratelimit
          image: {{ .Values.rateLimiting.global.service.image }}
          ports:
            - containerPort: 8080   # HTTP
            - containerPort: 8081   # gRPC
            - containerPort: 6070   # Debug
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: REDIS_SOCKET_TYPE
              value: "tcp"
            - name: REDIS_URL
              {{- if .Values.rateLimiting.global.redis.internal }}
              value: "ratelimit-redis.istio-system.svc.cluster.local:6379"
              {{- else }}
              value: "{{ .Values.rateLimiting.global.redis.host }}:{{ .Values.rateLimiting.global.redis.port }}"
              {{- end }}
            - name: USE_STATSD
              value: "false"
            - name: RUNTIME_ROOT
              value: "/data"
            - name: RUNTIME_SUBDIRECTORY
              value: "ratelimit"
            - name: RUNTIME_WATCH_ROOT
              value: "false"
            - name: RUNTIME_IGNOREDOTFILES
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /data/ratelimit/config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: ratelimit-config

---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit
  namespace: istio-system
  labels:
    app: ratelimit
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 8081
      targetPort: 8081
      name: grpc
    - port: 6070
      targetPort: 6070
      name: debug
  selector:
    app: ratelimit
{{- end }}
