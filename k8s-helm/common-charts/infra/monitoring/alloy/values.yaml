# Grafana Alloy - Faro Receiver 설정
# 환경별 override: dev/values/monitoring/values-alloy.yaml

alloy:
  # Deployment mode
  alloy:
    configMap:
      create: true
      content: |
        // ===== Faro Receiver =====
        // 프론트엔드 RUM 데이터 수신 (브라우저 → Alloy)
        faro.receiver "frontend" {
          server {
            listen_address = "0.0.0.0"
            listen_port = 12347

            cors_allowed_origins = ["*"]
          }

          sourcemaps {}

          output {
            logs   = [loki.write.faro.receiver]
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // ===== Loki Exporter =====
        // Faro 로그 → Loki
        loki.write "faro" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push"
          }
        }

        // ===== Tempo Exporter =====
        // Faro 트레이스 → Tempo (OTLP 프로토콜)
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.monitoring.svc.cluster.local:4317"
            tls {
              insecure = true
            }
          }
        }

  # 리소스 설정
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Service 설정
  service:
    enabled: true
    type: ClusterIP

  # Faro 포트 노출
  extraPorts:
    - name: faro
      port: 12347
      targetPort: 12347
      protocol: TCP
