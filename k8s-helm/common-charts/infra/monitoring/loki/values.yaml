# Default values for Loki wrapper
# Official grafana/loki chart + promtail

# ===== Loki =====
loki:
  # 단일 바이너리 모드 (dev 환경에 적합)
  deploymentMode: SingleBinary

  loki:
    # 인증 비활성화
    auth_enabled: false

    # OTLP 수신 활성화 (Loki 3.0+)
    # OTel Collector에서 로그를 OTLP로 전송받음
    limits_config:
      retention_period: 168h  # 7일
      allow_structured_metadata: true  # OTLP 메타데이터 지원

    # 스토리지 설정 (filesystem)
    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  # Single Binary 설정
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      size: 20Gi

  # 불필요한 컴포넌트 비활성화
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  # Gateway 비활성화 (SingleBinary 모드에서는 불필요)
  gateway:
    enabled: false

  # 테스트 비활성화
  test:
    enabled: false

  # Grafana Enterprise 기능 비활성화
  lokiCanary:
    enabled: false

# ===== Promtail =====
promtail:
  enabled: true

  config:
    # Loki 엔드포인트
    clients:
      - url: http://loki:3100/loki/api/v1/push

    snippets:
      pipelineStages:
        - cri: {}
        - multiline:
            firstline: '^\d{4}-\d{2}-\d{2}'
            max_wait_time: 3s
            max_lines: 128

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # 모든 노드에서 실행
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# ===== Logs Backup to S3 =====
backup:
  enabled: false
  schedule: "0 4 * * *"  # 매일 오전 4시 (UTC) - DB 백업 1시간 후
  s3Bucket: goormgb-backup
  s3Prefix: dev/logs
  externalSecret:
    remoteRef: dev/infra/s3-backup  # PostgreSQL과 동일한 credentials 사용
  nodeSelector:
    kubernetes.io/hostname: control-plane-1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
