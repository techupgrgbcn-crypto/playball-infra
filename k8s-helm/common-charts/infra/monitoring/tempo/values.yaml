# Grafana Tempo - 분산 추적
# Grafana에서 datasource로 연결해서 사용

tempo:
  # 단일 바이너리 모드 (dev 환경)
  tempo:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # 트레이스 수신 설정
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
      zipkin:
        endpoint: "0.0.0.0:9411"
      jaeger:
        protocols:
          thrift_http:
            endpoint: "0.0.0.0:14268"
          grpc:
            endpoint: "0.0.0.0:14250"

    # 로컬 스토리지 (dev)
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # 보존 기간
    retention: 72h  # 3일

  persistence:
    enabled: true
    size: 10Gi

# Node placement
nodeSelector: {}
tolerations: []
