apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboards-infra-team-cicd
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus-stack
    release: {{ .Release.Name }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "인프라팀/CICD모니터링"
data:
  {{- $files := .Files.Glob "files/grafana-dashboards/infra-team-observability/cicd/*.json" }}
  {{- range $path, $_ := $files }}
  {{ base $path }}: |-
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
