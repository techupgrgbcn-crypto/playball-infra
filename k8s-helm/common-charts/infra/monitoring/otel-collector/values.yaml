# OpenTelemetry Collector 기본 설정
# 환경별 override: dev/values/values-otel-collector.yaml

opentelemetry-collector:
  mode: deployment
  replicaCount: 1

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.96.0"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

      # Tail-based Sampling (문서 요구사항)
      tail_sampling:
        decision_wait: 10s
        num_traces: 100000
        expected_new_traces_per_sec: 100
        policies:
          # 에러 Trace: 100% 수집
          - name: error-policy
            type: status_code
            status_code:
              status_codes: [ERROR]
          # 느린 요청 (>3초): 100% 수집
          - name: latency-policy
            type: latency
            latency:
              threshold_ms: 3000
          # 정상 요청: 10% 샘플링
          - name: probabilistic-policy
            type: probabilistic
            probabilistic:
              sampling_percentage: 10

    exporters:
      # Tempo로 trace 전송
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # 디버깅용 로그
      logging:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, tail_sampling]
          exporters: [otlp/tempo, logging]
