{{- range .Values.certificates }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: istio-system
spec:
  secretName: {{ .name }}
  issuerRef:
    name: {{ .issuerRef }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
