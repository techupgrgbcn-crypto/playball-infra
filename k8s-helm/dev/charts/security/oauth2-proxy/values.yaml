# OAuth2 Proxy for Swagger UI authentication
replicaCount: 1

image:
  repository: quay.io/oauth2-proxy/oauth2-proxy
  tag: v7.6.0
  pullPolicy: IfNotPresent

# Google OAuth settings
config:
  cookieSecure: true
  cookieDomain: ".dev.goormgb.space"

# Upstream services (OAuth2 Proxy가 인증 후 프록시할 서비스)
upstreams:
  # Spring Cloud Gateway (Swagger UI)
  apiGateway: "http://dev-api-gateway.dev-webs.svc.cluster.local:8085"
  # FastAPI AI Defense (docs)
  aiDefense: "http://dev-ai-defense.dev-ai.svc.cluster.local:8000"

# ESO integration
eso:
  enabled: false
  secretKey: ""  # dev/infra/oauth/swagger

# Service settings
service:
  port: 4180

# Node placement
nodeSelector: {}
tolerations: []

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
