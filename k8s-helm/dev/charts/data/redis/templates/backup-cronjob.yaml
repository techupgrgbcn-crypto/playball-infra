{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: redis:7-alpine
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-backup-s3
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-backup-s3
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: ap-northeast-2
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3Bucket }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3Prefix }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache aws-cli

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="dump-${TIMESTAMP}.rdb"

                  echo "=== Redis Backup ==="

                  # --rdb 옵션은 자체적으로 일관된 스냅샷 생성
                  redis-cli -h {{ .Release.Name }} --rdb /tmp/${BACKUP_FILE}
                  aws s3 cp /tmp/${BACKUP_FILE} s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_FILE}

                  echo "Backup complete: ${BACKUP_FILE}"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
{{- end }}
