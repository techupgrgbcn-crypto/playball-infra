{{- if .Values.exporter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
data:
  queries.yaml: |
    pg_stat_statements:
      query: |
        SELECT
          pg_get_userbyid(userid) as user,
          pg_database.datname as database,
          pg_stat_statements.queryid,
          LEFT(pg_stat_statements.query, 100) as query,
          pg_stat_statements.calls as calls_total,
          pg_stat_statements.total_exec_time / 1000 as seconds_total,
          pg_stat_statements.mean_exec_time / 1000 as mean_seconds,
          pg_stat_statements.rows as rows_total
        FROM pg_stat_statements
        JOIN pg_database ON pg_database.oid = pg_stat_statements.dbid
        WHERE pg_stat_statements.query NOT LIKE '%pg_stat_statements%'
        ORDER BY pg_stat_statements.total_exec_time DESC
        LIMIT 50
      metrics:
        - user:
            usage: "LABEL"
            description: "User who executed the query"
        - database:
            usage: "LABEL"
            description: "Database name"
        - queryid:
            usage: "LABEL"
            description: "Query ID"
        - query:
            usage: "LABEL"
            description: "Query text (truncated)"
        - calls_total:
            usage: "COUNTER"
            description: "Number of times executed"
        - seconds_total:
            usage: "COUNTER"
            description: "Total time spent in seconds"
        - mean_seconds:
            usage: "GAUGE"
            description: "Mean execution time in seconds"
        - rows_total:
            usage: "COUNTER"
            description: "Total rows retrieved"

    pg_database_size:
      query: |
        SELECT pg_database.datname as database,
               pg_database_size(pg_database.datname) as size_bytes
        FROM pg_database
        WHERE datistemplate = false
      metrics:
        - database:
            usage: "LABEL"
            description: "Database name"
        - size_bytes:
            usage: "GAUGE"
            description: "Database size in bytes"

    pg_stat_activity:
      query: |
        SELECT
          pg_database.datname as database,
          state,
          COUNT(*) as count
        FROM pg_stat_activity
        JOIN pg_database ON pg_database.oid = pg_stat_activity.datid
        GROUP BY pg_database.datname, state
      metrics:
        - database:
            usage: "LABEL"
            description: "Database name"
        - state:
            usage: "LABEL"
            description: "Connection state"
        - count:
            usage: "GAUGE"
            description: "Number of connections"
{{- end }}
