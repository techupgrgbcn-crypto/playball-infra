{{- if .Values.exporter.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  endpoints:
    - port: http-metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - targetLabel: release
          replacement: postgresql
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        # instance를 "postgresql (IP:port)" 형식으로 변경
        - sourceLabels: [__meta_kubernetes_pod_name, __address__]
          separator: " ("
          replacement: "$1$2)"
          targetLabel: instance
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
