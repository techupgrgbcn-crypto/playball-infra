apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  redis.conf: |
    dir /data
    maxmemory {{ .Values.config.maxmemory }}
    maxmemory-policy {{ .Values.config.maxmemoryPolicy }}

    # AI Defense용: 영속성 비활성화 (메모리만 사용)
    appendonly no
    save ""

    # Disable dangerous commands (FLUSHDB는 테스트용으로 허용)
    rename-command FLUSHALL ""
    rename-command DEBUG ""
