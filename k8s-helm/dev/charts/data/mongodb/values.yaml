# MongoDB for AI Agent logging

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

externalSecret:
  enabled: true
  secretStore: aws-secrets-manager
  remoteRef: dev/services/mongodb

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  port: 27017

nodeSelector:
  kubernetes.io/hostname: control-plane-1
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
