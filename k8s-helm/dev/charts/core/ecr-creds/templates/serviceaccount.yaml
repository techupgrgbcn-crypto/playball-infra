apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-creds-refresher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecr-creds-refresher
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecr-creds-refresher
subjects:
  - kind: ServiceAccount
    name: ecr-creds-refresher
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: ecr-creds-refresher
  apiGroup: rbac.authorization.k8s.io
