# ai-defense - Dev 환경
# ECR: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/ai
# Python FastAPI 기반 AI Defense API

replicaCount: 1

# Uvicorn 실행 명령어 (root-path 설정 for /ai prefix)
command:
  - "python"
args:
  - "-m"
  - "uvicorn"
  - "traffic_master_ai.defense.api.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--root-path"
  - "/ai"

image:
  repository: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/ai
  tag: "de7a2ad"
  pullPolicy: Always

# Python 모듈 경로 설정 + AI Defense 환경변수
env:
  - name: PYTHONPATH
    value: /app/src
  # AI Defense 설정
  - name: TM_AI_DEFENSE_HOST
    value: "0.0.0.0"
  - name: TM_AI_DEFENSE_PORT
    value: "8000"
  - name: TM_RUNTIME_STATE_BACKEND
    value: "redis"
  - name: TM_DEFENSE_POLICY_VERSION
    value: "def-pol-2.0.0"
  # Redis 연결 (Secrets Manager에서 가져옴)
  - name: AI_REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_HOST
  - name: AI_REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_PORT

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: worker-node-1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false  # api.dev.goormgb.space/ai/* 경로로 접근

# Service
service:
  type: ClusterIP
  port: 8000

# Health checks (FastAPI endpoints)
livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# Prometheus Metrics (FastAPI - 같은 포트에서 /metrics 노출)
metrics:
  enabled: true
  port: 8000
  portName: http
  path: /metrics
  interval: 15s

# OpenTelemetry (앱에 opentelemetry SDK 설치 필요)
otel:
  enabled: true
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"
