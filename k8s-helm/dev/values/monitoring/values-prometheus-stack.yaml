# kube-prometheus-stack - Dev 환경
# Domain: goormgb.space
# Note: kube-prometheus-stack을 직접 배포하므로 prefix 없이 root level에 값 설정

# ===== prometheus-extras용 설정 (ExternalSecrets, VirtualService) =====
# Grafana Gateway (prometheus-extras 차트에서 사용)
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls

# ===== kube-prometheus-stack용 설정 =====
# Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook 비활성화 (TLS 인증서 문제 방지)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: control-plane-1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# kube-state-metrics: CP 노드에 배치
kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: control-plane-1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# kubeadm: 컨트롤 플레인 컴포넌트 모니터링 활성화
kubeControllerManager:
  enabled: true
  endpoints:
    - 10.0.0.10
  service:
    enabled: true
    port: 10257
    targetPort: 10257
  serviceMonitor:
    https: true
    insecureSkipVerify: true
kubeScheduler:
  enabled: true
  endpoints:
    - 10.0.0.10
  service:
    enabled: true
    port: 10259
    targetPort: 10259
  serviceMonitor:
    https: true
    insecureSkipVerify: true
kubeEtcd:
  enabled: true
  endpoints:
    - 10.0.0.10
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    scheme: http
kubeProxy:
  enabled: true

prometheus:
  prometheusSpec:
    # 모든 namespace 메트릭 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collector에서 메트릭 수신 (remote write)
    enableRemoteWriteReceiver: true

    # etcd TLS 인증서 마운트
    secrets:
      - etcd-client-cert

    retention: 3d
    retentionSize: "5GB"

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1536Mi

    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  # prometheus-extras용 ESO 설정
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google

  fullnameOverride: grafana

  # init-chown-data 비활성화 (PVC 권한 문제 방지)
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  # 대시보드 폴더 설정 (sidecar 방식)
  sidecar:
    dashboards:
      enabled: true
      folder: /tmp/dashboards
      folderAnnotation: grafana_folder
      searchNamespace: monitoring
      provider:
        foldersFromFilesStructure: true
        allowUiUpdates: true

  # kube-prometheus-stack 기본 대시보드 완전 비활성화
  defaultDashboardsEnabled: false
  forceDeployDashboards: false
  defaultDashboardsTimezone: utc

  # 대시보드 프로바이더 설정
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "dev-team-observability-templates"
          orgId: 1
          folder: "필요시 조회 - 표준 템플릿 (개발)"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/dev-team-observability-templates

        - name: "infra-team-observability-templates"
          orgId: 1
          folder: "필요시 조회 - 표준 템플릿 (인프라)"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/infra-team-observability-templates

