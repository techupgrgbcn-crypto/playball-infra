  # ESO에서 생성한 secret 사용
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  # Google OAuth 설정 - Secret에서 환경변수 주입
  envFrom:
    - secretRef:
        name: google-oauth-credentials
        optional: false

  grafana.ini:
    server:
      root_url: https://grafana.goormgb.space
    # Alerting 완전 비활성화 (Viewer RBAC 에러 방지)
    unified_alerting:
      enabled: false
    alerting:
      enabled: false
    auth.google:
      enabled: true
      allow_sign_up: true
      auto_login: false
      scopes: openid email profile
      allow_assign_grafana_admin: true
      skip_org_role_sync: false
      auth_url: https://accounts.google.com/o/oauth2/auth
      token_url: https://oauth2.googleapis.com/token
      api_url: https://openidconnect.googleapis.com/v1/userinfo
      # client_id, client_secret은 envFrom secretRef에서 주입
      # 이메일 기반 역할 할당
      role_attribute_path: >-
        contains(['admin@example.com', 'admin2@example.com', 'admin3@example.com'], email) && 'Admin' ||
        contains(['editor1@example.com', 'editor2@example.com', 'editor3@example.com', 'editor4@example.com', 'editor6@example.com', 'editor5@example.com'], email) && 'Editor' ||
        contains(['viewer1@example.com', 'viewer2@example.com', 'viewer3@example.com', 'viewer4@example.com', 'viewer5@example.com', 'viewer6@example.com', 'viewer7@example.com', 'viewer8@example.com'], email) && 'Viewer' ||
        ''
    users:
      auto_assign_org: true
      auto_assign_org_role: Viewer
    auth:
      disable_login_form: false

  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: control-plane-1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 768Mi

  # Loki + Tempo datasource 추가
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
