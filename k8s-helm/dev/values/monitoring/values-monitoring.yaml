              value: Tempo

      # test 폴더 대시보드는 grafana-dashboards-test-configmap.yaml에서 관리
      # (files/grafana-dashboards/test/*.json - 한글 대시보드)

    # ESO에서 생성한 secret 사용
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    # Google OAuth 설정
    envFromSecret: google-oauth-credentials

    grafana.ini:
      server:
        root_url: https://grafana.goormgb.space
      # Alerting 완전 비활성화 (Viewer RBAC 에러 방지)
      unified_alerting:
        enabled: false
      alerting:
        enabled: false
      auth.google:
        enabled: true
        allow_sign_up: true
        auto_login: false
        scopes: openid email profile
        allow_assign_grafana_admin: true
        skip_org_role_sync: false
        auth_url: https://accounts.google.com/o/oauth2/auth
        token_url: https://oauth2.googleapis.com/token
        api_url: https://openidconnect.googleapis.com/v1/userinfo
        # client_id, client_secret은 envFromSecret에서 주입
        # 이메일 기반 역할 할당
        # Admin: DevOps, Editor: Developers, Viewer: 기타 허용된 멤버
        role_attribute_path: >-
          contains(['admin@example.com', 'admin2@example.com', 'admin3@example.com'], email) && 'Admin' ||
          contains(['editor1@example.com', 'editor2@example.com', 'editor3@example.com', 'editor4@example.com', 'editor6@example.com', 'editor5@example.com'], email) && 'Editor' ||
          contains(['viewer1@example.com', 'viewer2@example.com', 'viewer3@example.com', 'viewer4@example.com', 'viewer5@example.com', 'viewer6@example.com', 'viewer7@example.com', 'viewer8@example.com'], email) && 'Viewer' ||
          ''
      users:
        auto_assign_org: true
        auto_assign_org_role: Viewer # 기본 역할
      auth:
        disable_login_form: false # admin 로그인 유지

    # Role mapping (이메일 기반)
    # Admin: DevOps (212clab, rhuba, chamchi)
    # Editor: Developers
    # Viewer: 기타 허용된 멤버

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 768Mi

    # Loki + Tempo datasource 추가
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: true

  alertmanager:
    # 알람 설정은 dev/values/monitoring/alerting/*.yaml에서 관리
    alertmanagerSpec:
      nodeSelector:
        kubernetes.io/hostname: control-plane-1
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls

# ===== Loki (공식 grafana/loki 차트) =====
loki:
  # 단일 바이너리 모드 (dev 환경)
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    # OTLP 수신 지원 (Loki 3.0+)
    limits_config:
      retention_period: 48h # 2일
      allow_structured_metadata: true # OTLP 메타데이터

    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  singleBinary:
    replicas: 1
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 768Mi
    persistence:
      enabled: true
      size: 10Gi

  # 불필요한 컴포넌트 비활성화 (SingleBinary 모드)
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  # 캐시 비활성화 (dev 환경)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  # minio 비활성화
  minio:
    enabled: false

# ===== Promtail =====
promtail:
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}

  # 모든 노드에서 실행
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ===== Logs Backup to S3 =====
backup:
  enabled: true
  schedule: "0 4 * * *" # 매일 오전 4시 (UTC) - DB 백업 1시간 후
  s3Bucket: goormgb-backup
  s3Prefix: dev/logs
  externalSecret:
    remoteRef: dev/infra/s3-backup # PostgreSQL 백업과 동일한 credentials

# ===== Tempo =====
tempo:
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: control-plane-1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  tempo:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 768Mi

    # Trace retention: 2일
    retention: 48h

    # Compactor로 오래된 trace 정리
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        block:
          bloom_filter_false_positive: 0.05

  persistence:
    enabled: true
    size: 10Gi
