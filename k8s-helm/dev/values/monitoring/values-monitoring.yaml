# kubeadm - 모니터링 스택 설정
# Domain: goormgb.space
# Components: Prometheus, Grafana, Loki, Tempo
# Note: kubeadm Endpoints는 302-bootstrap에서 관리 (ArgoCD가 Endpoints exclude함)

# Grafana ESO 설정
grafana:
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google

# ===== Prometheus Stack =====
kube-prometheus-stack:
  # Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
  fullnameOverride: prom
  cleanPrometheusOperatorObjectNames: true

  # Admission webhook 비활성화 (TLS 인증서 문제 방지)
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kube-state-metrics: CP 노드에 배치
  kube-state-metrics:
    nodeSelector:
      kubernetes.io/hostname: control-plane-1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kubeadm: 컨트롤 플레인 컴포넌트 모니터링 활성화
  kubeControllerManager:
    enabled: true
    endpoints:
      - 10.0.0.10
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeScheduler:
    enabled: true
    endpoints:
      - 10.0.0.10
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeEtcd:
    enabled: true
    endpoints:
      - 10.0.0.10
    service:
      enabled: true
      port: 2381
      targetPort: 2381
    serviceMonitor:
      scheme: http
  kubeProxy:
    enabled: true

  prometheus:
    prometheusSpec:
      # 모든 namespace 메트릭 수집
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      # OTel Collector에서 메트릭 수신 (remote write)
      enableRemoteWriteReceiver: true

      # etcd TLS 인증서 마운트
      secrets:
        - etcd-client-cert

      retention: 3d
      retentionSize: "5GB"

      # CP 노드에 배치
      nodeSelector:
        kubernetes.io/hostname: control-plane-1
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1536Mi

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    fullnameOverride: grafana

    # init-chown-data 비활성화 (PVC 권한 문제 방지)
    initChownData:
      enabled: false
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472

    # 대시보드 폴더 설정 (sidecar 방식)
    sidecar:
      dashboards:
        enabled: true
        folder: /tmp/dashboards
        folderAnnotation: grafana_folder
        searchNamespace: monitoring
        provider:
          foldersFromFilesStructure: true  # 디렉토리 구조를 Grafana 폴더로 변환
          allowUiUpdates: true

    # kube-prometheus-stack 기본 대시보드 완전 비활성화
    # (우리가 test 폴더에 직접 구성한 대시보드 사용)
    defaultDashboardsEnabled: false
    forceDeployDashboards: false
    defaultDashboardsTimezone: utc

    # 대시보드 프로바이더 설정
    # - 커스텀 대시보드: sidecar가 담당 (grafana_folder annotation 사용)
    # - 템플릿 대시보드: dashboardProviders로 관리 (Grafana.com gnetId)
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          # 템플릿 폴더만 유지 (커스텀 대시보드는 sidecar가 담당)
          - name: "dev-team-observability-templates"
            orgId: 1
            folder: "필요시 조회 - 표준 템플릿 (개발)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/dev-team-observability-templates

          - name: "infra-team-observability-templates"
            orgId: 1
            folder: "필요시 조회 - 표준 템플릿 (인프라)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infra-team-observability-templates

    # ConfigMap 기반 커스텀 대시보드는 sidecar가 자동 감지
    # ConfigMap에 grafana_dashboard: "1" 라벨 + grafana_folder annotation 사용
    # dashboardsConfigMaps 사용 안 함 (sidecar와 중복되어 충돌 발생)

    # Grafana.com 대시보드 매핑
    dashboards:
      dev-team-observability-templates:
        service-pod-health:
          gnetId: 17125
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        service-traffic-istio:
          gnetId: 7636
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        service-workload-istio:
          gnetId: 7630
          revision: 1
          datasource:
