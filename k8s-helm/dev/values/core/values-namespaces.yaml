# kubeadm-dev - Namespace 설정
# Istio sidecar injection 활성화

namespaces:
  - name: dev-webs
    istio: true   # Spring Boot + Next.js 웹 앱
  - name: dev-ai
    istio: true   # FastAPI AI Agent 서비스
  - name: data
    istio: true   # PostgreSQL, Redis - Kiali에서 트래픽 모니터링
  - name: monitoring
    istio: false  # Prometheus, Grafana - Istio 불필요
  - name: infra
    istio: false  # 인프라 CronJobs - Istio 불필요
